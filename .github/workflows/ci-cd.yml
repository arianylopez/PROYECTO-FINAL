name: CinemaPlus CI Pipeline

on:
  pull_request:
    branches: [ "main", "master", "develop" ]
  push:
    branches: [ "main", "master" ]

jobs:
  frontend-validation:
    name: Frontend (React) CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-react

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Validations (Lint + Build + Audit)
        run: npm run validate

  backend-validation:
    name: Backend (FastAPI/Django) CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    env:
      DB_USER: ci_test_user
      DB_PASSWORD: ci_test_password
      DB_NAME: ci_db
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: test_secret_key_ci_cd_12345
      ALGORITHM: HS256
      ENVIRONMENT: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest # Por si acaso

      - name: Verify Migrations (Django)
        run: python manage.py makemigrations --check --dry-run

      - name: Run Backend Tests
        run: pytest